name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  intelligence-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intelligence-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn --batch-mode --no-transfer-progress verify

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend, intelligence-service]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker build --tag mailpilot-api ./backend
      - run: docker build --tag mailpilot-web ./frontend
      - run: docker build --tag mailpilot-intelligence ./intelligence-service
