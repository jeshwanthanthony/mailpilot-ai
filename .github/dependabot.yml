version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend:
        patterns: ["*"]
  - package-ecosystem: maven
    directory: /intelligence-service
    schedule:
      interval: weekly
    groups:
      java:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
