services:
  intelligence:
    build: ./intelligence-service
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      TRIAGE_SERVICE_URL: http://intelligence:8080
    depends_on:
      intelligence:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
